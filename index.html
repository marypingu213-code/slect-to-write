<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作文小幫手 - 智慧導引寫作系統</title>
    <!-- 使用 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .recording-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 螢幕顯示時隱藏列印區域 */
        #print-area {
            display: none;
        }

        /* 列印專用樣式 - 橫向紙張、直排書寫 */
        @media print {
            body > *:not(#print-area) {
                display: none !important;
            }
            #print-area {
                display: block !important;
                writing-mode: vertical-rl; /* 直排書寫，由右至左 */
                text-orientation: mixed;
                font-family: 'Noto Serif TC', serif;
                font-size: 24pt;
                line-height: 2.2;
                letter-spacing: 0.15em;
                padding: 1.5cm;
                width: 100vw;
                height: 100vh;
                background-color: white !important;
                color: black !important;
                white-space: pre-wrap;
            }
            @page {
                size: A4 landscape; /* 強制橫向紙張 */
                margin: 0;
            }
        }
    </style>
</head>
<body class="text-slate-900 selection:bg-purple-100">

    <!-- 列印專用的隱藏容器 -->
    <div id="print-area"></div>

    <div class="min-h-screen p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            
            <!-- Header 區塊 -->
            <header class="mb-8 text-center fade-in no-print">
                <div class="inline-flex items-center justify-center p-4 bg-white text-purple-600 rounded-3xl mb-4 shadow-sm border border-slate-100">
                    <i data-lucide="sparkles" class="w-10 h-10"></i>
                </div>
                <h1 class="text-4xl font-black text-slate-800 mb-4 tracking-tight">作文小幫手</h1>
                
                <div class="flex flex-wrap justify-center gap-2 mb-2">
                    <span class="text-slate-400 font-bold self-center mr-2">題目路徑：</span>
                    <div id="topic-selector" class="inline-flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                        <!-- JS 會在此生成題目切換按鈕 -->
                    </div>
                </div>
            </header>

            <!-- 進度指示器 -->
            <div id="progress-container" class="mb-12 px-2 fade-in max-w-4xl mx-auto no-print">
                <div class="flex justify-between mb-4 relative" id="progress-dots">
                    <div class="absolute top-1/2 left-0 right-0 h-0.5 bg-slate-200 -translate-y-1/2 -z-10 mx-4"></div>
                </div>
                <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                    <div id="progress-bar" class="h-full bg-purple-600 transition-all duration-700 ease-out" style="width: 0%"></div>
                </div>
            </div>

            <!-- 主要內容區塊 -->
            <div id="main-card" class="bg-white rounded-[2.5rem] shadow-2xl shadow-purple-200/30 p-6 md:p-10 border border-white min-h-[500px] flex flex-col transition-all duration-500">
                <!-- 由 JS 注入內容 -->
            </div>

            <footer class="mt-12 text-center text-slate-400 text-sm font-medium border-t border-slate-200 pt-8 no-print">
                <p>© 2024 互動式教育工具集 | 讓每個孩子都能大聲說出好作文</p>
            </footer>
        </div>
    </div>

    <script>
        // --- 題目資料庫 ---
        const topicPaths = {
            timemachine: {
                name: "如果我有一臺時光機",
                themeColor: "purple",
                steps: [
                    { title: "第一步：你想去哪一個時間點？", key: "q1", items: [
                        { id: "回到恐龍時代", label: "恐龍時代", icon: "🦖", desc: "親眼看看巨大的霸王龍" },
                        { id: "去到未來世界", label: "未來世界", icon: "🚀", desc: "看看以後的房子是不是會飛" },
                        { id: "回到小時候", label: "我的小時候", icon: "👶", desc: "看看自己剛出生的可愛模樣" },
                        { id: "回到犯錯的那一天", label: "修正過去", icon: "⏪", desc: "回到忘記帶東西或吵架的那天" },
                        { id: "回到古代當大俠", label: "古代武俠", icon: "⚔️", desc: "去古代學習神奇的武功" },
                        { id: "去外星文明看外星人", label: "外星星球", icon: "👽", desc: "看看外星人的高科技生活" }
                    ]},
                    { title: "第二步：為什麼想去那個時候？", key: "q2", items: [
                        { id: "感到好奇", label: "滿足好奇心", icon: "🤔", desc: "世界有好多我不知道的秘密" },
                        { id: "彌補遺憾", label: "改寫錯誤", icon: "🩹", desc: "想把做錯的事情重新做對" },
                        { id: "想見見某人", label: "非常想念", icon: "🫂", desc: "想再見到已經不在身邊的人" },
                        { id: "尋找消失的寶藏", label: "尋找寶藏", icon: "💎", desc: "發掘埋藏在地下的古代秘密" },
                        { id: "了解歷史的真相", label: "歷史真相", icon: "📜", desc: "親身體驗書本上記載的事情" },
                        { id: "想要冒險", label: "單純愛冒險", icon: "🗺️", desc: "想體驗不一樣的生活樂趣" }
                    ]},
                    { title: "第三步：在那裡你想做什麼事？", key: "q3", items: [
                        { id: "拍下珍貴照片", label: "紀錄瞬間", icon: "📸", desc: "把最難得的畫面拍下來留念" },
                        { id: "提醒過去的我", label: "提點自己", icon: "📢", desc: "告訴過去的我要更努力、更勇敢" },
                        { id: "送出一份禮物", label: "傳遞溫暖", icon: "🎁", desc: "給過去或未來的親人一個驚喜" },
                        { id: "阻止爭吵發生", label: "守護和平", icon: "🤝", desc: "主動道歉讓大家重新和好" },
                        { id: "帶回新科技", label: "帶回未來科技", icon: "💻", desc: "用未來的智慧解決現在的問題" },
                        { id: "阻止自然災害", label: "拯救地球", icon: "🌪️", desc: "在災害發生前預先發出警告" }
                    ]},
                    { title: "第四步：回到現在，我可以怎麼做？", key: "q4", items: [
                        { id: "珍惜當下時間", label: "珍惜時間", icon: "⌛", desc: "不浪費每一分每一秒" },
                        { id: "對身邊人更好", label: "愛身邊的人", icon: "💖", desc: "現在就去擁抱爸爸媽媽" },
                        { id: "記錄美好生活", label: "寫下日記", icon: "📓", desc: "讓現在的每一天都值得回憶" },
                        { id: "規劃未來", label: "認真規劃時間", icon: "📅", desc: "把每一天都安排得充實有意義" },
                        { id: "多讀歷史", label: "學習歷史知識", icon: "📖", desc: "從歷史中學習人生的道理" },
                        { id: "保持勇敢", label: "勇敢面對現在", icon: "💪", desc: "就算沒有時光機也能解決困難" }
                    ]}
                ],
                templates: [
                    (s) => `如果我有一臺時光機，我最想去的時間點是「${s.q1}」。\n\n我之所以想去那裡，是因為我對那段時光「${s.q2}」。在我的想像中，那是一個非常神奇的地方，如果真的能抵達，一定會是我人生中最難忘的一場旅行。\n\n抵達那裡後，我最想做的事情就是「${s.q3}」。對我來說，這不只是好玩，更是為了留下一些美好的回憶，或者是幫助那些需要的人，讓自己像個真正的時空冒險家。\n\n雖然現實生活中並沒有真正的時光機，但我明白，每一分每一秒過去了就不能重來。所以，從現在開始，我決定要「${s.q4}」。我想，只要能珍惜現在，每一天都可以像冒險一樣精采！`,
                    (s) => `假如我有一台神奇的時光機，我會立刻調整時間，飛往「${s.q1}」。\n\n那是一個令我「${s.q2}」的時刻。如果我能真的到達現場，我最想做的一件事就是「${s.q3}」，那一定非常有意義，能為我的生活增添許多美麗色彩。\n\n即使現在還沒有時光機，我也學會了時間的重要性。以後我要「${s.q4}」，把現在的每一刻都過得很有價值，努力朝著目標前進。`
                ]
            },
            superpower: {
                name: "我最想擁有的超能力",
                themeColor: "blue",
                steps: [
                    { title: "第一步：你想擁有哪種力量？", key: "q1", items: [
                        { id: "自由飛翔", label: "自由飛翔", icon: "🕊️", desc: "像鳥兒一樣穿梭在雲端" },
                        { id: "隱身術", label: "隱身術", icon: "👻", desc: "安靜地觀察，不被發現" },
                        { id: "動物語言", label: "動物語言", icon: "🐱", desc: "聽懂流浪貓狗的心聲" },
                        { id: "瞬間移動", label: "瞬間移動", icon: "🚪", desc: "一秒鐘到達想去的地方" },
                        { id: "伸縮能力", label: "變大變小", icon: "📏", desc: "可以像蟻人一樣自由變幻大小" },
                        { id: "超級大腦", label: "過目不忘", icon: "🧠", desc: "讀過的書一輩子都不會忘記" }
                    ]},
                    { title: "第二步：為什麼想要這個能力？", key: "q2", items: [
                        { id: "不再遲到", label: "不再遲到", icon: "⏰", desc: "解決每天趕時間的煩惱" },
                        { id: "幫助寵物", label: "幫助寵物", icon: "🐶", desc: "想知道牠們為什麼不開心" },
                        { id: "減輕負擔", label: "減輕負擔", icon: "🎒", desc: "讓沉重的書包變輕盈" },
                        { id: "守護地球", label: "守護地球環境", icon: "🌱", desc: "想用力量讓世界環境變更好" },
                        { id: "提高效率", label: "解決懶惰問題", icon: "⚡", desc: "想把手邊的事情做得又快又好" },
                        { id: "探索秘境", label: "探索秘密基地", icon: "🏝️", desc: "去沒人去過的遠方冒險" }
                    ]},
                    { title: "第三步：你想用它做什麼好事？", key: "q3", items: [
                        { id: "拯救受困者", label: "拯救困難", icon: "🚑", desc: "在危急時刻勇敢保護大家" },
                        { id: "清理地球", label: "清理垃圾", icon: "♻️", desc: "讓森林和海洋變漂亮" },
                        { id: "溫暖陪伴", label: "陪伴孤單老人", icon: "👴", desc: "讓孤單的人感受到快樂" },
                        { id: "幫人找回失物", label: "尋找失物", icon: "🔍", desc: "幫同學找回弄丟的寶貝" },
                        { id: "修復大師", label: "修復物品", icon: "🛠️", desc: "讓大家心愛的東西都能恢復原狀" },
                        { id: "綠色魔法", label: "荒地變森林", icon: "🌲", desc: "用能力在沙漠種出滿滿的樹木" }
                    ]},
                    { title: "第四步：現在的我如何努力？", key: "q4", items: [
                        { id: "鍛鍊身體", label: "鍛鍊體魄", icon: "🏃", desc: "讓自己變得健康有力" },
                        { id: "充實知識", label: "充實大腦", icon: "📚", desc: "讀書學習，用智慧解決難題" },
                        { id: "熱心助人", label: "學習助人", icon: "❤️", desc: "就算沒法力也能愛人" },
                        { id: "認真學習", label: "做好每件事", icon: "✍️", desc: "練習專注，把每一件事都做好" },
                        { id: "練習表達", label: "勇敢表達", icon: "🗣️", desc: "把心裡的好想法勇敢說出來" },
                        { id: "發揮所長", label: "發揮特長", icon: "🌟", desc: "找出最厲害的地方並好好發揮" }
                    ]}
                ],
                templates: [
                    (s) => `我最想擁有的超能力是「${s.q1}」。\n\n如果我擁有這個能力，那該有多好！因為在生活中，我常常覺得「${s.q2}」這件事讓我很困擾，如果有超能力，我就可以輕鬆解決問題。\n\n我不僅想讓自己方便，更想用這份力量去幫助別人。例如，我想嘗試「${s.q3}」，看見別人臉上的笑容，我也會覺得非常有成就感。\n\n雖然我現在還沒有法力，但我相信，只要我願意「${s.q4}」，我也能成為一個優秀的人。我想，一顆願意助人的心，就是最強大的超能力！`,
                    (s) => `我夢想著有一天能擁有「${s.q1}」的超能力。因為我一直被「${s.q2}」所困擾，所以這股力量對我來說非常重要，能讓生活變得多采多姿。\n\n當我有這份能力時，我會去「${s.q3}」，幫助需要的人，這讓我感到非常有意義。即使現在還沒法術，我也會練習「${s.q4}」，讓自己變得更棒！`
                ]
            }
        };

        // --- 狀態管理 ---
        let currentTopic = 'timemachine';
        let currentStep = 0;
        let currentTemplateIndex = 0;
        let selections = { q1: '', q2: '', q3: '', q4: '' };
        let isRecording = false;
        let recognition = null;
        let textBeforeRecording = ''; // 記錄錄音開始前的文字

        // 語音辨識初始化
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                }
                const output = document.getElementById('my-speech-output');
                if (output && finalTranscript) {
                    output.value = textBeforeRecording + finalTranscript;
                }
            };
        }

        function initIcons() { lucide.createIcons(); }

        function renderTopicSelector() {
            const selector = document.getElementById('topic-selector');
            selector.innerHTML = Object.keys(topicPaths).map(key => `
                <button onclick="switchTopic('${key}')" class="px-4 py-2 rounded-xl text-sm font-bold transition-all ${currentTopic === key ? 'bg-purple-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-50'}">
                    ${topicPaths[key].name}
                </button>
            `).join('');
        }

        function switchTopic(key) { currentTopic = key; resetApp(); }

        function render() {
            renderTopicSelector();
            renderProgress();
            const mainCard = document.getElementById('main-card');
            const path = topicPaths[currentTopic];
            
            if (currentStep < 4) {
                document.getElementById('progress-container').classList.remove('hidden');
                const stepData = path.steps[currentStep];
                mainCard.innerHTML = `
                    <div class="fade-in flex-grow max-w-4xl mx-auto w-full">
                        <div class="flex items-center gap-3 mb-8">
                            <div class="p-3 bg-purple-100 rounded-2xl text-purple-600"><i data-lucide="compass"></i></div>
                            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">${stepData.title}</h2>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${stepData.items.map(item => `
                                <button onclick="selectOption('${item.id}')" class="group p-6 rounded-3xl border-2 text-left transition-all hover:border-purple-400 hover:shadow-md active:scale-95 ${selections[stepData.key] === item.id ? 'border-purple-600 bg-purple-50 ring-4 ring-purple-50' : 'border-slate-100 bg-white'}">
                                    <div class="flex items-center gap-4">
                                        <div class="text-4xl group-hover:scale-110 transition-transform">${item.icon}</div>
                                        <div><div class="font-bold text-lg text-slate-800">${item.label}</div><div class="text-xs text-slate-500">${item.desc}</div></div>
                                    </div>
                                </button>`).join('')}
                        </div>
                        <div class="mt-12"><button onclick="prevStep()" ${currentStep === 0 ? 'disabled' : ''} class="flex items-center gap-2 px-6 py-2 rounded-xl font-bold ${currentStep === 0 ? 'opacity-30' : 'text-slate-500 hover:bg-slate-100'}"><i data-lucide="arrow-left" class="w-4 h-4"></i> 返回上一關</button></div>
                    </div>`;
            } else {
                document.getElementById('progress-container').classList.add('hidden');
                mainCard.innerHTML = `
                    <div class="fade-in flex flex-col h-full">
                        <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4 border-b border-slate-50 pb-4 no-print">
                            <div class="flex items-center gap-3">
                                <div class="p-3 bg-indigo-100 rounded-2xl text-indigo-600 shadow-sm"><i data-lucide="award"></i></div>
                                <div><h2 class="text-2xl font-bold text-slate-800">恭喜！寫作藍圖已完成</h2><p class="text-slate-400 text-sm">點選左側參考，並在右側練習口說或打字吧！</p></div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="printResult()" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white hover:bg-green-700 rounded-xl font-bold shadow-md shadow-green-100"><i data-lucide="printer"></i> 列印作品</button>
                                <button onclick="resetApp()" class="flex items-center gap-2 px-4 py-2 text-slate-400 hover:text-purple-600 font-bold group"><i data-lucide="refresh-cw" class="group-hover:rotate-180 transition-transform"></i> 重新開始</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 flex-grow">
                            <!-- 左側：建議範本 -->
                            <div class="flex flex-col no-print">
                                <div class="flex items-center justify-between mb-3 px-2 text-indigo-600 font-bold gap-2">
                                    <span class="flex items-center gap-2"><i data-lucide="file-text"></i> 建議範本</span>
                                    <button onclick="shuffleTemplate()" class="text-xs bg-indigo-100 px-2 py-1 rounded-full hover:bg-indigo-200 transition-all"><i data-lucide="shuffle" class="inline w-3 h-3"></i> 重組風格</button>
                                </div>
                                <div class="bg-indigo-50/50 border-2 border-indigo-100 rounded-[2rem] p-6 shadow-inner flex-grow"><pre class="whitespace-pre-wrap font-serif text-lg leading-relaxed text-slate-700">${path.templates[currentTemplateIndex](selections)}</pre></div>
                            </div>
                            <!-- 右側：口說練習 -->
                            <div class="flex flex-col no-print">
                                <div class="flex items-center justify-between mb-3 px-2 text-purple-600 font-bold gap-2">
                                    <span class="flex items-center gap-2"><i data-lucide="user"></i> 我的口說練習</span>
                                    <div id="recording-status" class="hidden text-xs text-red-500 animate-pulse font-bold">● 錄音中...</div>
                                </div>
                                <div class="bg-purple-50/50 border-2 border-purple-100 rounded-[2rem] p-6 shadow-inner flex flex-col flex-grow relative">
                                    <textarea id="my-speech-output" placeholder="點選右下角麥克風，對著左側範本說說看你的作文吧！" class="w-full h-full bg-transparent border-none focus:ring-0 text-lg font-serif leading-relaxed text-slate-700 resize-none"></textarea>
                                    <div class="absolute bottom-4 right-4">
                                        <button id="mic-btn" onclick="toggleRecording()" class="w-16 h-16 bg-purple-600 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-purple-700 active:scale-95 transition-all"><i data-lucide="mic" id="mic-icon"></i></button>
                                    </div>
                                </div>
                                <div class="mt-4 text-center"><p class="text-xs text-slate-400 italic">錄音功能建議使用 Chrome 瀏覽器。點一下開始，再點一下結束。</p></div>
                            </div>
                        </div>
                    </div>`;
            }
            initIcons();
        }

        function renderProgress() {
            const progressDots = document.getElementById('progress-dots');
            const progressBar = document.getElementById('progress-bar');
            let html = '<div class="absolute top-1/2 left-0 right-0 h-0.5 bg-slate-200 -translate-y-1/2 -z-10 mx-4"></div>';
            for (let i = 0; i <= 4; i++) {
                const isActive = currentStep === i;
                const isCompleted = currentStep > i;
                const colorClass = isActive ? 'bg-white border-purple-600 text-purple-600 scale-110 shadow-lg' : isCompleted ? 'bg-green-500 border-green-500 text-white' : 'bg-white border-slate-300 text-slate-400';
                html += `<div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold border-2 transition-all ${colorClass}">${isCompleted ? '<i data-lucide="check" class="w-5 h-5"></i>' : i + 1}</div>`;
            }
            progressDots.innerHTML = html;
            progressBar.style.width = `${(currentStep / 4) * 100}%`;
        }

        function selectOption(val) {
            const path = topicPaths[currentTopic];
            selections[path.steps[currentStep].key] = val;
            if (currentStep < 4) setTimeout(() => { currentStep++; render(); }, 300);
        }

        function prevStep() { if (currentStep > 0) { currentStep--; render(); } }

        function shuffleTemplate() {
            currentTemplateIndex = (currentTemplateIndex + 1) % topicPaths[currentTopic].templates.length;
            render();
        }

        function toggleRecording() {
            if (!recognition) return alert("您的瀏覽器不支援語音辨識功能。");
            if (isRecording) stopRecording(); else startRecording();
        }

        function startRecording() {
            isRecording = true;
            textBeforeRecording = document.getElementById('my-speech-output').value;
            recognition.start();
            document.getElementById('mic-btn').classList.add('bg-red-500', 'recording-pulse');
            document.getElementById('recording-status').classList.remove('hidden');
            document.getElementById('mic-icon').setAttribute('data-lucide', 'square');
            initIcons();
        }

        function stopRecording() {
            isRecording = false;
            recognition.stop();
            document.getElementById('mic-btn').classList.remove('bg-red-500', 'recording-pulse');
            document.getElementById('recording-status').classList.add('hidden');
            document.getElementById('mic-icon').setAttribute('data-lucide', 'mic');
            initIcons();
        }

        function printResult() {
            const content = document.getElementById('my-speech-output').value;
            if (!content.trim()) return alert("口說練習區目前沒有內容喔！請先練習說話再列印。");
            document.getElementById('print-area').innerText = content;
            window.print();
        }

        function resetApp() { if(isRecording) stopRecording(); currentStep = 0; currentTemplateIndex = 0; selections = { q1:'', q2:'', q3:'', q4:'' }; render(); }
        window.onload = render;
    </script>
</body>
</html>
